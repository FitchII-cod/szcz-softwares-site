<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — SZCZ Softwares</title>
  <meta name="description" content="La page que vous recherchez n'existe pas.">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/logo.jpg">
  <meta name="theme-color" content="#0c0f10">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .notfound {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--bg);
      font-family: var(--mono);
    }
    .notfound-term { max-width: 640px; width: 100%; }
    .notfound-code {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .notfound-title {
      font-size: 48px;
      color: var(--accent);
      margin: 0 0 8px 0;
      font-family: var(--mono);
      letter-spacing: -0.02em;
    }
    .notfound-sub {
      color: var(--fg-2);
      margin: 0 0 24px 0;
      font-family: var(--sans);
    }
    .notfound-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <main class="notfound">
    <div class="notfound-term">
      <div class="term-window">
        <div class="term-header">
          <span class="term-dot term-dot-red"></span>
          <span class="term-dot term-dot-amber"></span>
          <span class="term-dot term-dot-green"></span>
          <span class="term-title">~/szcz-softwares — error</span>
        </div>
        <div class="term-body">
          <div class="notfound-code">$ cat /var/log/requests.log | grep 404</div>
          <h1 class="notfound-title">404</h1>
          <p class="notfound-sub">Page introuvable — ce chemin n'existe pas ou a été déplacé.</p>
          <div class="notfound-actions">
            <a href="/" class="btn btn-primary"><span class="btn-arrow">▸</span> cd /</a>
            <a href="/#contact" class="btn btn-ghost">contact <span class="btn-arrow">→</span></a>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
